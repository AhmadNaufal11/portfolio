<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Naufal — Corporate Trust</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>
<div class="page-indicator">PG 1/6</div>

<nav class="comic-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <div class="nav-logo" onclick="location.href='index.html'" tabindex="0" role="button">AHMAD N.</div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><i class="fas fa-bars"></i> MENU</button>
    <div class="nav-links" id="navLinks" role="menubar">
      <a class="nav-link active" href="index.html" role="menuitem">Home</a>
      <a class="nav-link" href="aboutme.html" role="menuitem">About Me</a>
      <a class="nav-link" href="academic.html" role="menuitem">Academic</a>
      <a class="nav-link" href="skill.html" role="menuitem">Skill</a>
      <a class="nav-link" href="project.html" role="menuitem">Project</a>
      <a class="nav-link" href="contact.html" role="menuitem">Contact</a>
    </div>
  </div>
</nav>

<main class="hero">
  <div class="hero-inner">
    <div class="hero-image-panel panel reveal" style="padding: 1rem; position: relative;">
      <div class="hero-image"><img src="passportmerah.png" alt="Ahmad Naufal passport photo"></div>
      <div class="float-dot" style="width:14px; height:14px; background:var(--primary); bottom:-10px; left:-10px;" aria-hidden="true"></div>
      <div class="float-dot" style="width:10px; height:10px; background:var(--accent); top:15px; right:15px;" aria-hidden="true"></div>
    </div>
    <div class="hero-text-panel panel reveal" style="animation-delay: 0.15s;">
      <div class="hero-text-content">
        <p class="hero-greeting">Welcome to My Portfolio</p>
        <h1 class="hero-name">I'm Ahmad Naufal</h1>
        <p class="hero-role">Software Development Student</p>
        <div class="hero-buttons">
          <a href="aboutme.html" class="comic-btn btn-alt"><i class="fas fa-user"></i> About Me</a>
          <a href="contact.html" class="comic-btn"><i class="fas fa-envelope"></i> Contact</a>
        </div>
      </div>
      <div class="float-dot" style="width:18px; height:18px; background:var(--ink); bottom:20px; right:20px;" aria-hidden="true"></div>
      <div class="float-dot" style="width:12px; height:12px; background:var(--bg-lines); top:20px; left:20px;" aria-hidden="true"></div>
    </div>
  </div>
</main>

<footer class="notebook-footer">
  <div class="footer-inner">
    <div class="footer-text">
      <p class="footer-line-1">My Portfolio</p>
      <p class="footer-line-2">Thank you for visiting my Portfolio</p>
      <p class="footer-line-3">Current Date &amp; Time : <span id="liveDateTime">--</span></p>
    </div>
    <button class="back-to-top-btn" id="backToTop" aria-label="Back to top" title="Back to top"><i class="fas fa-arrow-up"></i></button>
  </div>
</footer>

<script>
  document.getElementById('navToggle').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
  const revealObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); }); }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  
  const dot = document.getElementById('cursorDot');
  let mx = 0, my = 0, dx = 0, dy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() { dx += (mx - dx) * 0.15; dy += (my - dy) * 0.15; dot.style.left = (dx - 5) + 'px'; dot.style.top = (dy - 5) + 'px'; requestAnimationFrame(animCursor); })();
  if ('ontouchstart' in window) dot.style.display = 'none';

  document.getElementById('backToTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  
  function updateDateTime() {
    const now = new Date();
    document.getElementById('liveDateTime').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateDateTime(); setInterval(updateDateTime, 1000);
</script>
</body>
</html>
